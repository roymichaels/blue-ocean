groups:
  - name: service-alerts
    rules:
      - alert: HighServiceLatency
        expr: histogram_quantile(0.95, sum(rate(service_latency_seconds_bucket[5m])) by (le,service)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: High service latency
          description: 95th percentile latency over 1s for 5m.
      - alert: HighServiceFailureRate
        expr: sum(rate(service_failures_total[5m])) by (service) / sum(rate(service_latency_seconds_count[5m])) by (service) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: High service failure rate
          description: More than 5% of service calls failing over 5m.
      - alert: AdminUnauthorizedAttempts
        expr: rate(admin_unauthorized_attempts_total[1m]) > 3
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: Excessive unauthorized admin attempts
          description: More than 3 unauthorized admin actions per minute.
      - alert: AuthRateLimitSpike
        expr: rate(auth_rate_limit_total[1m]) > 5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: Spike in auth rate limiting
          description: More than 5 auth requests per minute rejected due to rate limiting.
      - alert: InvalidAuthScope
        expr: sum(rate(auth_invalid_scope_total[5m])) / sum(rate(auth_scope_requests_total[5m])) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: High rate of invalid auth scope requests
          description: Invalid scope requests exceed 1% of total over 5m.
